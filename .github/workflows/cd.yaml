name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        type: choice
        required: true
        description: Semantic version
        default: patch
        options:
          - patch
          - minor
          - major

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yaml
    secrets: inherit

  release:
    name: Release
    needs:
      - ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        with:
          fundamentry-token: ${{ secrets.FUNDAMENTRY_TOKEN }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        id: gpg
        with:
          gpg_private_key: ${{ secrets.MONETIS_BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.MONETIS_BOT_GPG_PASSPHRASE }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true

      - name: Count projects
        id: projects
        run: echo "count=$(pnpm nx show projects --json | jq 'length')" >> "$GITHUB_OUTPUT"

      - name: Release
        if: ${{ fromJson(steps.projects.outputs.count) > 0 }}
        run: pnpm nx release --skip-publish --first-release ${{ inputs.version }}
        env:
          GH_TOKEN: ${{ secrets.MONETIS_BOT_TOKEN }}

  deploy:
    name: Deploy
    needs:
      - release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup
        with:
          fundamentry-token: ${{ secrets.FUNDAMENTRY_TOKEN }}

      - name: Deploy
        run: pnpm deploy
        env:
          ENVIRONMENT: production
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
          SANITY_STUDIO_CORE_PROJECT_ID: ${{ vars.SANITY_STUDIO_CORE_PROJECT_ID }}
          SANITY_STUDIO_CORE_DATASET: ${{ vars.SANITY_STUDIO_CORE_DATASET }}
